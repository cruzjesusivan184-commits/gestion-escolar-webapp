<!-- eliminar-user-modal.html
     Modal de confirmación de eliminación de usuario.
     Se abre desde AdminScreen, MaestrosScreen o AlumnosScreen.
     Muestra un título dinámico interpolando la variable `rol` (administrador/maestro/alumno).
     Los botones invocan cerrar_modal() (cancelar) y eliminarUser() (confirmar).
     El evento (click) en Angular enlaza un evento del DOM (clic) con un método del componente. -->
<div class="wrapper">
  <div class="icon-close">
      <button class="btn" (click)="cerrar_modal()">
          <i class="bi bi-x-lg"></i>
      </button>
  </div>
  <div class="body-modal">
      <h1 class="title-modal">Eliminar {{rol}}</h1>
      <span class="descripcion">Estás a punto de eliminar este {{rol}}. Una vez que lo elimines no podrás deshacer esta acción.</span>
      <div class="buttons-modal">
          <button mat-button class="btn-regresar" (click)="cerrar_modal()">
              Cancelar
          </button>
          <button mat-button class="btn-eliminar" (click)="eliminarUser()">
              Eliminar
          </button>
      </div>
  </div>
</div>
