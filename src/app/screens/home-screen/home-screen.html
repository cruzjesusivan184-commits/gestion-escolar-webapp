<!-- home-screen.html
     Pantalla de inicio del dashboard.
     Ruta: /home

     Muestra la pantalla de gestión correspondiente al rol del usuario:
       - administrador → app-admin-screen
       - alumno → app-alumnos-screen
       - maestro → app-maestros-screen

     @if (rol === 'X'): la variable `rol` se obtiene de AuthServices en ngOnInit()
     y determina qué componente hijo se inserta en el DOM.
     Los componentes no mostrados NO se renderizan, ahorrando peticiones HTTP. -->
<div class="wrapper">
  <div class="section-home">
    <div class="body-home">
      <!-- Home para el admin -->
      @if (rol === 'administrador') {
        <section class="home-admin">
          <app-admin-screen></app-admin-screen>
        </section>
      }
      <!-- Home para el alumno -->
      @if (rol === 'alumno') {
        <section class="home-alumno">
          <app-alumnos-screen></app-alumnos-screen>
        </section>
      }
      <!-- Home para el maestro -->
      @if (rol === 'maestro') {
        <section class="home-maestro">
          <app-maestros-screen></app-maestros-screen>
        </section>
      }
    </div>
  </div>
</div>
