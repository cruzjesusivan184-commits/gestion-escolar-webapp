<!-- graficos-screen.html
     Pantalla de análisis visual con gráficas dinámicas.
     Ruta: /graficas

     Usa el componente <canvas baseChart> de ng2-charts (wrapper de Chart.js).
     Atributos de cada canvas:
       type="line"|"bar"|"pie"|"doughnut": define el tipo de gráfica.
       [data]: objeto con labels y datasets (datos y colores).
       [plugins]: array de plugins de Chart.js (aquí DatalabelsPlugin).
       [options]: configuración adicional como responsive.

     Los datos de usuarios (line, pie, doughnut) se cargan del backend via
     GET /total-usuarios/. Los datos de eventos (bar) son estáticos por ahora.

     Se divide en dos secciones con alertas decorativas:
       1. "Análisis De Eventos Académicos": line chart + bar chart.
       2. "Análisis De Usuarios": pie chart + doughnut chart. -->
<!-- Contenedor principal que aplica el margen del sidebar -->
<div class="wrapper main-content-graficas">
  <div class="section-home">
    <div class="header-home"></div>

    <!-- Cuerpo principal de la pantalla de gráficas -->
    <div class="body-home">

      <!-- Título principal de la sección -->
      <div class="row mt-5 mb-5">
        <div class="col-12">
          <span class="title-perfil">Análisis De Usuarios Del Sistema</span>
        </div>
      </div>

      <div class="container">

        <!-- ── SECCIÓN 1: Eventos Académicos ──────────────────────── -->
        <div class="row mt-3 mb-5" style="text-align: center;">
          <div class="col-12">
            <div class="alert alert-primary" role="alert">
              <span class="title-table">Análisis De Eventos Académicos</span>
            </div>
          </div>
        </div>

        <!-- Grid con gráfica de línea y gráfica de barras -->
        <div class="graph-section">

          <!-- Gráfica tipo histograma (line): usuarios por rol -->
          <div class="graph">
            <canvas
              baseChart
              type="line"
              [data]="lineChartData"
              [plugins]="lineChartPlugins"
              [options]="lineChartOption">
            </canvas>
          </div>

          <!-- Gráfica tipo barras (bar): eventos académicos registrados -->
          <div class="graph">
            <canvas
              baseChart
              type="bar"
              [data]="barChartData"
              [plugins]="barChartPlugins"
              [options]="barChartOption">
            </canvas>
          </div>

        </div><!-- /graph-section -->

        <!-- ── SECCIÓN 2: Análisis de Usuarios ───────────────────── -->
        <div class="row mt-3 mb-5" style="text-align: center;">
          <div class="col-12">
            <div class="alert alert-primary" role="alert">
              <span class="title-table">Análisis De Usuarios</span>
            </div>
          </div>
        </div>

        <!-- Grid con gráfica de pastel y gráfica de dona -->
        <div class="user-section">

          <!-- Gráfica tipo pastel (pie): distribución de usuarios por rol -->
          <div class="graph">
            <canvas
              baseChart
              type="pie"
              [data]="pieChartData"
              [plugins]="pieChartPlugins"
              [options]="pieChartOption">
            </canvas>
          </div>

          <!-- Gráfica tipo dona (doughnut): distribución de usuarios por rol -->
          <div class="graph">
            <canvas
              baseChart
              type="doughnut"
              [data]="doughnutChartData"
              [plugins]="doughnutChartPlugins"
              [options]="doughnutChartOption">
            </canvas>
          </div>

        </div><!-- /user-section -->

      </div><!-- /container -->

    </div><!-- /body-home -->

  </div><!-- /section-home -->

</div><!-- /wrapper -->
